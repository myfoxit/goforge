<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GoForge Admin</title>
<style>
:root{
  --bg:210 20% 98%;--fg:222 47% 11%;--card:0 0% 100%;--muted:215 16% 47%;
  --border:214 32% 91%;--primary:222 47% 11%;--primary-fg:210 40% 98%;
  --accent:210 40% 96%;--danger:0 72% 51%;--success:142 71% 45%;--warning:38 92% 50%;
  --ring:222 47% 40%;--radius:8px;
}
:root.dark{
  --bg:222 47% 8%;--fg:210 40% 98%;--card:222 47% 11%;--muted:215 20% 65%;
  --border:217 33% 20%;--primary:210 40% 98%;--primary-fg:222 47% 11%;
  --accent:217 33% 17%;--ring:213 27% 60%;
}
*{box-sizing:border-box}
body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  background:hsl(var(--bg));color:hsl(var(--fg));font-size:14px;line-height:1.5}
a{color:inherit;text-decoration:none}
button{font:inherit;cursor:pointer}
input,select,textarea{font:inherit}
.hidden{display:none!important}
.muted{color:hsl(var(--muted))}
.row{display:flex;align-items:center;gap:8px}
.spread{display:flex;align-items:center;justify-content:space-between;gap:8px}
.stack{display:flex;flex-direction:column;gap:12px}
.wrap{flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:6px;height:36px;padding:0 14px;border-radius:6px;
  border:1px solid transparent;background:hsl(var(--primary));color:hsl(var(--primary-fg));font-weight:500}
.btn:hover{opacity:.9}
.btn.sm{height:30px;padding:0 10px;font-size:13px}
.btn.ghost{background:transparent;color:hsl(var(--fg));border-color:transparent}
.btn.ghost:hover{background:hsl(var(--accent))}
.btn.outline{background:transparent;color:hsl(var(--fg));border-color:hsl(var(--border))}
.btn.outline:hover{background:hsl(var(--accent))}
.btn.danger{background:hsl(var(--danger));color:#fff}
.btn:disabled{opacity:.5;pointer-events:none}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.field label{font-weight:500;font-size:13px}
.input{height:36px;padding:0 10px;border-radius:6px;border:1px solid hsl(var(--border));
  background:hsl(var(--card));color:hsl(var(--fg));width:100%}
textarea.input{height:auto;min-height:80px;padding:8px 10px;font-family:ui-monospace,monospace;resize:vertical}
.input:focus{outline:none;border-color:hsl(var(--ring));box-shadow:0 0 0 3px hsl(var(--ring)/.15)}
.card{background:hsl(var(--card));border:1px solid hsl(var(--border));border-radius:var(--radius)}
.badge{display:inline-flex;padding:2px 8px;border-radius:999px;font-size:12px;font-weight:500;
  background:hsl(var(--accent));color:hsl(var(--fg))}
.badge.green{background:hsl(var(--success)/.15);color:hsl(var(--success))}
.badge.amber{background:hsl(var(--warning)/.15);color:hsl(38 60% 40%)}
.badge.red{background:hsl(var(--danger)/.15);color:hsl(var(--danger))}
table{width:100%;border-collapse:collapse}
th,td{text-align:left;padding:9px 12px;border-bottom:1px solid hsl(var(--border));white-space:nowrap}
th{color:hsl(var(--muted));font-weight:500;font-size:12.5px;background:hsl(var(--accent)/.4)}
tbody tr:hover{background:hsl(var(--accent)/.4)}
tbody tr:last-child td{border-bottom:0}
code{font-family:ui-monospace,monospace;background:hsl(var(--accent));padding:1px 5px;border-radius:4px;font-size:12.5px}
pre{background:hsl(var(--accent));padding:12px;border-radius:6px;overflow:auto;font-size:12.5px;position:relative}
#login{min-height:100vh;display:grid;place-items:center;padding:20px}
#login .card{width:100%;max-width:380px;padding:28px}
#shell{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
#sidebar{border-right:1px solid hsl(var(--border));padding:16px 12px;display:flex;flex-direction:column;gap:3px;
  background:hsl(var(--card));position:sticky;top:0;height:100vh;overflow-y:auto}
#sidebar .brand{font-weight:700;font-size:16px;padding:6px 10px 14px;display:flex;align-items:center;gap:8px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:6px;color:hsl(var(--muted));font-weight:500;text-align:left;border:0;background:transparent;width:100%}
.nav-item:hover{background:hsl(var(--accent));color:hsl(var(--fg))}
.nav-item.active{background:hsl(var(--accent));color:hsl(var(--fg))}
.nav-head{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:hsl(var(--muted));padding:14px 10px 4px}
#main{padding:22px 26px;overflow:auto;max-width:100%}
.page-title{font-size:20px;font-weight:600;margin:0 0 2px}
.toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.table-wrap{border:1px solid hsl(var(--border));border-radius:var(--radius);overflow:auto}
.overlay{position:fixed;inset:0;background:#0007;z-index:40}
.modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:41;width:min(92vw,600px);
  max-height:88vh;overflow:auto;background:hsl(var(--card));border:1px solid hsl(var(--border));
  border-radius:12px;padding:22px;box-shadow:0 12px 48px #0004}
.modal h3{margin:0 0 16px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}
#toasts{position:fixed;bottom:16px;right:16px;z-index:60;display:flex;flex-direction:column;gap:8px}
.toast{background:hsl(var(--card));border:1px solid hsl(var(--border));border-left:3px solid hsl(var(--primary));
  border-radius:8px;padding:10px 14px;box-shadow:0 6px 20px #0003;max-width:340px;animation:ti .2s ease}
@keyframes ti{from{opacity:0;transform:translateX(1rem)}}
.toast.err{border-left-color:hsl(var(--danger))}
.toast.ok{border-left-color:hsl(var(--success))}
.field-row{display:grid;grid-template-columns:1fr 130px 70px 70px 34px;gap:8px;align-items:center;margin-bottom:8px}
.spin{width:16px;height:16px;border:2px solid currentColor;border-right-color:transparent;border-radius:50%;
  display:inline-block;animation:sp .6s linear infinite;vertical-align:-3px}
@keyframes sp{to{transform:rotate(360deg)}}
.grid2{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.stat{padding:16px;border:1px solid hsl(var(--border));border-radius:var(--radius);background:hsl(var(--card))}
.stat .n{font-size:24px;font-weight:700}
.stat .l{color:hsl(var(--muted));font-size:13px}
.empty{text-align:center;padding:40px;color:hsl(var(--muted))}
@media(max-width:720px){#shell{grid-template-columns:1fr}#sidebar{position:static;height:auto}}
</style>
</head>
<body>
<div id="app"></div>
<div id="toasts"></div>
<script src="./app.js"></script>
</body>
</html>
